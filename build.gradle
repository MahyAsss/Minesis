plugins {
    id 'eclipse'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '5.1.+'
}

group = 'com.minesis'
version = '1.2.0'
archivesBaseName = 'minesis'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

compileJava.options.encoding = 'UTF-8'

minecraft {
    mappings channel: 'official', version: '1.20.1'
    
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.level.net.minecraftforge', 'debug'
            args '--username', 'Developer'
            mods {
                minesis {
                    source sourceSets.main
                }
            }
        }
        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.level.net.minecraftforge', 'debug'
            args '--nogui'
            mods {
                minesis {
                    source sourceSets.main
                }
            }
        }
    }
}

repositories {
    maven { url 'https://maven.maxhenkel.de/releases' }
    maven { url 'https://jitpack.io' }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.4.10'

    // Simple Voice Chat API (compile-time only, runtime provided by the mod)
    compileOnly 'de.maxhenkel.voicechat:voicechat-api:2.6.13'

    // Baritone API (compile-time only). The Baritone mod must be installed on the client
    // similar to Simple Voice Chat; we don't bundle the runtime JAR into our mod.
    compileOnly 'com.github.cabaletta:baritone:1.2.15'

    // Vosk Java API — on the compile classpath and bundled into the mod JAR below.
    implementation files('libs/vosk-0.3.45.jar')
}

jar {
    // Bundle Vosk classes + its embedded native libs (win32-x86-64, linux-x86-64, darwin).
    // LibVosk.class handles extraction to a temp dir and System.load() automatically.
    from(zipTree('libs/vosk-0.3.45.jar')) {
        exclude 'META-INF/**'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    manifest {
        attributes([
            'Specification-Title'     : 'Minesis',
            'Specification-Vendor'    : 'MahyAss',
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion,
            'Implementation-Vendor'   : 'MahyAss',
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file:///${project.projectDir}/mcmodsrepo"
        }
    }
}

